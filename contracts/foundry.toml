[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 1000
via_ir = true
evm_version = "cancun"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@uniswap/v3-core/=lib/v3-core/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
monad = "${MONAD_RPC_URL}"

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
